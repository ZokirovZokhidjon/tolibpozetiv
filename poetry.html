<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шеърият гулшани</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; background: #f4f4f4; margin: 0; min-height: 100vh; }
        header { background: #333; color: gold; padding: 20px; text-align: center; }
        
        .container { display: flex; padding: 20px; gap: 20px; flex-wrap: wrap; }
        
        /* Асосий матн қисми */
        .main-content { flex: 3; background: white; padding: 30px; border-radius: 10px; min-height: 400px; min-width: 300px; }
        
        /* Ўнг томондаги рўйхат */
        .sidebar { flex: 1; background: #fff; padding: 20px; border-radius: 10px; min-width: 250px; }
        .sidebar h3 { border-bottom: 2px solid gold; }
        
        .poem-link { cursor: pointer; color: #007bff; margin: 10px 0; display: block; font-size: 18px; }
        .poem-link:hover { text-decoration: underline; }

        pre { white-space: pre-wrap; font-family: 'Georgia', serif; font-size: 18px; line-height: 1.6; }
        
        .main-content img {
            border-radius: 50%; /* 50% бўлса идеал доира бўлади */
            border: 4px solid gold;
            box-shadow: 3px 5px 8px #888;
            max-width: 100%;
        }

        /* МОБИЛ ТЕЛЕФОНЛАР УЧУН МОСЛАШУВ */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { order: -1; } /* Телефонда рўйхат шеърдан тепага чиқади */
        }
    </style>
</head>
<body>

<header>
    <h1>Толибжон Исроилов — Шеърият гулшани</h1>
    <a href="index.html" style="color: white; font-size: 14px;">Бош саҳифага қайтиш</a>
</header>

<div class="container">
    <div class="main-content" id="viewer">
        <h2>Хуш келибсиз!</h2>
        <img src="logo.jpg" alt="log" width="200" height="200">
        <p>Илтимос, ўнг томондан шеърни танланг.</p>
    </div>

    <div class="sidebar">
        <h3>Шеърлар рўйхати</h3>
        <div id="links">
            <span class="poem-link" onclick="showPoem(1)">Биринчи шеър</span>
            <span class="poem-link" onclick="showPoem(2)">58 navoyini uqimay quysa</span>
            <span class="poem-link" onclick="showPoem(3)">103 BOLALIK 1</span>
            <span class="poem-link" onclick="showPoem(4)">Қадрингни ерга уришларига йўл қўйма</span>
            <span class="poem-link" onclick="showPoem(5)">111 Qaerda bo'lsangiz</span>
        </div>
    </div>
</div>

<script>
const poems = {
    1: { title: "Биринчи шеър", body: "02 Билиб билмай", audio: "https://files.catbox.moe/e8oecg.mp3" },
    2: { title: "58 navoyini uqimay quysa", body: "58 navoyini uqimay quysa", audio: "https://files.catbox.moe/bkjkoz.mp3" },
    3: { title: "103 BOLALIK 1", body: "103 BOLALIK 1", audio: "https://files.catbox.moe/2h39sa.mp3" },
    4: { title: "Қадрингни ерга уришларига йўл қўйма", body: "Қадрингни ерга уришларига йўл қўйма", audio: "https://files.catbox.moe/su6fu8.mp3" },
    5: { title: "111 Qaerda bo'lsangiz", body: "111 Qaerda bo'lsangiz", audio: "https://files.catbox.moe/3npf6z.mp3" }
};

function showPoem(id) {
    const viewer = document.getElementById('viewer');
    const poem = poems[id];
    let audioHTML = poem.audio ? `
        <div style="margin-top: 20px;">
            <p>Шеърни тинглаш:</p>
            <audio controls style="width: 100%;">
                <source src="${poem.audio}" type="audio/mpeg">
                Сизнинг браузерингиз аудиони қўллаб-қувватламайди.
            </audio>
        </div>` : '';

    viewer.innerHTML = `<h2>${poem.title}</h2><pre>${poem.body}</pre>${audioHTML}`;
}
</script>

</body>
</html>
