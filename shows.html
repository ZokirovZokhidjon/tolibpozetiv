<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Қизиқарли кўрсатувлар</title>
 <style>
        body { font-family: 'Segoe UI', sans-serif; background-image: url(phone.jpg); background-size: cover; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* Кўп устунли Grid дизайн */
        .grid-container { 
            display: grid; 
            /* Бу код карточкаларни ёнма-ён 3 тадан (ёки экранга қараб) жойлаштиради */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 20px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .video-box { width: 100%; height: 250px; border-radius: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #333; }
    </style>
</head>
<body>

<div class="header">
    <h1>Қизиқарли кўрсатувлар</h1>
    <a href="index.html" class="back-link">Асосий саҳифага қайтиш</a>
</div>

<div class="grid-container" id="video-grid">
    </div>

<script>
    // Шу ерга YouTube видео ID ларини ёзасиз
    const videos = [
        "VugtL58MvDc", // 1-видео ID си
        "6kDC1h2e4gY",   // 2-видео ID си
        "2Zb2Bj854H8",
        // ... жами 16 тагача ID қўшишингиз мумкин
    ];

    const grid = document.getElementById('video-grid');

    videos.forEach(id => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <iframe class="video-box" src="https://www.youtube.com/embed/${id}" 
            frameborder="0" allowfullscreen></iframe>
            <p>Кўрсатув №${videos.indexOf(id) + 1}</p>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
