<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Галерея</title>
    <style>
        body{
            background-color: cadetblue;
        }
        .container { max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        .container h1{
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 25px;
            color: gold;
        }

        /* Карусель дизайн */
        .carousel { width: 400px; height: 500px; overflow: hidden; position: relative; border-radius: 10px; box-shadow: 3px 5px 8px;justify-content: center; align-items: center;  margin: 55px; }
        .carousel img { width: 100%; height: 100%; object-fit: cover; }

        /* Галерея карточкалари */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .gallery-item { cursor: pointer; width: 100%; height: 200px; object-fit: cover; border-radius: 8px; transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.05); }

        /* Modal (катталаштириш) */
        #modal { display: none; position: fixed; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        #modal img { max-width: 80%; max-height: 80%; margin: 5% auto; display: block; border: 5px solid white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Фотогалерея</h1>
    
    <div class="carousel">
        <img id="carousel-img" src="ph.jpg">
    </div>

    <div class="gallery-grid" id="gallery"></div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <img id="modal-img">
</div>

<script>
    const images = ["ph.jpg", "ph2.jpg", "ph3.jpg", "phone.jpg", "logo.jpg"];
    
    // 1. Карусель мантиқи
    let index = 0;
    const carouselImg = document.getElementById('carousel-img');
    setInterval(() => {
        index = (index + 1) % images.length;
        carouselImg.src = images[index];
    }, 3000); // Ҳар 3 секундда ўзгаради

    // 2. Галереяни яратиш
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'gallery-item';
        img.onclick = () => {
            modal.style.display = 'block';
            modalImg.src = src;
        };
        gallery.appendChild(img);
    });
</script>
</body>
</html>
